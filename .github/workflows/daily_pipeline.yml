# .github/workflows/daily_pipeline.yml
# Runs the weather ETL pipeline daily and commits the updated DB + report back to the repo.
# Uses GitHub Actions free tier — no external services or paid APIs required.

name: Daily Weather ETL Pipeline

on:
  schedule:
    # Runs every day at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Also allows manual trigger from the Actions tab
    inputs:
      days_back:
        description: "Days of history to fetch"
        required: false
        default: "7"

jobs:
  run-pipeline:
    name: Extract → Transform → Load → Analyze
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so we can push back

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run unit tests ────────────────────────────────────────────────
      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      # ── 5. Run the ETL pipeline ──────────────────────────────────────────
      - name: Run ETL pipeline
        run: |
          DAYS=${{ github.event.inputs.days_back || '7' }}
          python pipeline/run_pipeline.py --days $DAYS

      # ── 6. Commit updated artifacts ──────────────────────────────────────
      - name: Commit updated DB and report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weather.db reports/daily_summary.md
          git diff --staged --quiet || git commit -m "chore: daily pipeline run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. Upload DB as artifact (optional, for download/inspection) ─────
      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weather-db-${{ github.run_id }}
          path: weather.db
          retention-days: 7
